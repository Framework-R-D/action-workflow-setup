name: Guardrail Push Alerts
on:
  push:
    branches: [main]

jobs:
  slack-alert:
    runs-on: ubuntu-latest
    permissions: {} # Explicitly drops all token permissions
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Process and Format Slack Alert
        env:
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # GitHub sets the committer name to 'GitHub' for clean web-UI PR merges.
          # If the committer isn't 'GitHub', an admin pushed directly via local CLI.
          if [ "${{ github.event.head_commit.committer.name }}" != "GitHub" ]; then
            PAYLOAD='{"text": "⚠️ *Direct Push to Main Detected!*\n*Repo:* `'${{ github.repository }}'`\n*Actor:* `@'${{ github.actor }}'`\n*Commit:* `'${{ github.event.head_commit.message }}'`"}'
            curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_URL"
          fi
